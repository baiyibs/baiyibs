name: Waka Readme

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          API_BASE_URL: ${{ secrets.WAKAPI_BASE_URL }}
          WAKATIME_API_KEY: ${{ secrets.WAKAPI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MESSAGE: 'Update coding stats'
          SHOW_LANGUAGE: 'true'
          LANG_COUNT: '5'
          SHOW_TOTAL: 'true'
          SHOW_MASKED_TIME: 'false'
          BLOCKS: '░▒▓█'
          TIME_RANGE: 'last_30_days'
          SHOW_TIME: 'true'
